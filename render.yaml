services:
  - type: web
    name: kinto-gdht
    env: python
    rootDir: rental-analysis-app
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 --worker-class gthread --timeout 240 --keep-alive 5 app:server
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
